name: 'Setup Node.js and pnpm'
description: 'Sets up Node.js, installs pnpm, and installs dependencies for the project.'

inputs:
  node-version:
    description: 'The Node.js version to use.'
    required: false
    default: '20'

runs:
  using: "composite"
  steps:
    - name: Read pnpm version from package.json
      id: read-pnpm-version
      shell: bash
      run: |
        PNPM_VERSION=$(node -p "require('./package.json').packageManager.split('@')[1]")
        echo "version=${PNPM_VERSION}" >> "$GITHUB_OUTPUT"

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ steps.read-pnpm-version.outputs.version }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'pnpm'
        cache-dependency-path: |
          pnpm-lock.yaml
          functions/pnpm-lock.yaml

    - name: Install dependencies
      shell: bash
      run: pnpm run install:ci
